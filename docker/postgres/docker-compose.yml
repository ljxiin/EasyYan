services:
  postgres:
    image: postgres:17
    container_name: easyyan-postgres
    restart: always

    environment:
      POSTGRES_DB: easyyan
      POSTGRES_USER: easyyan
      POSTGRES_PASSWORD: 123456

    ports:
      - "5432:5432"

    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyyan -d easyyan"]
      interval: 10s
      timeout: 5s
      retries: 5
